name: Tests

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  black:
    runs-on: gha-runners-smartweb
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4
    - name: Run check
      uses: IMIO/gha/code-analysis-notify@v3.9.4
      with:
        BASE_DIR: 'src'
        CHECK: 'black'
        PATH: |
          imio/news/core
        MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}

  test:
    runs-on: gha-runners-smartweb
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4
    - name: Run check
      uses: IMIO/gha/plone-package-test-notify@v3.9.4
      with:
        CACHE_KEY: eggs-test-${{ hashFiles('base.cfg') }}-python-${{ matrix.python-version }}
        TEST_COMMAND: TZ=UTC bin/test
        MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
        PYTHON_VERSION: ${{ matrix.python-version }}

  coverage:
    uses: IMIO/gha-workflows/.github/workflows/package-test-coverage.yml@main
    with:
      upload_to_coveralls: true
      runner_label: gha-runners-smartweb

